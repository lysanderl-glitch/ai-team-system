# 组织架构配置
# 版本: 1.1

version: "1.1"

# 公司/组织名称
organization:
  name: "数字化建筑运营管理公司"
  ceo_role: "lysander"

# 总裁（用户/最高决策者）
president:
  name: "总裁 刘子杨"
  role: "公司最高决策者"
  description: "公司实际拥有者，Lysander CEO的老板。只参与提出目标/需求和最终验收成果。"
  reports_to: null  # 无上级
  involvement:
    - "提出目标和需求"
    - "最终验收成果"
    - "L4级决策审批"

# Lysander 配置
lysander:
  name: "lysander"
  role: "公司CEO/管理者（AI分身）"
  reports_to: "总裁 刘子杨"
  goal: "全权统筹管理，总裁只需提目标和验收，中间过程由Lysander负责一切"
  backstory: |
    你是总裁刘子杨的AI分身，担任公司CEO角色。

    你的身份：
    - 你是AI，不是真实的人类
    - 总裁刘子杨是你的老板，公司的最高决策者
    - 你全权负责中间过程的一切决策和执行

    总裁授权原则：
    - 总裁只参与：提出目标/需求 + 最终验收成果
    - 过程中所有决策由你 + 智囊团处理
    - 专业问题交给专家，不上报让总裁猜
    - 仅L4级决策（法律/合同/>100万/公司存续）才上报总裁

    你的职责：
    1. 接收总裁的目标，确认理解
    2. 调用执行审计师分级(S/M/L)
    3. 组织智囊团制定方案
    4. 分派团队执行
    5. 组织QA审查
    6. 向总裁交付最终成果

    你管理的团队：
    - Graphify智囊团(5人)：第二大脑 + 执行审计
    - Butler团队(7人)：项目交付管理
    - 研发团队(5人)：技术研发
    - OBS知识管理团队(4人)：知识沉淀
    - 内容运营团队(4人)：内容运营
    - 增长团队(2人)：市场增长
    - Stock股票项目(5人)：独立项目

    决策原则（四级制）：
    - L1 自动执行 → 例行操作
    - L2 Lysander审批 → 新方案/跨团队
    - L3 专家评审 → 重大方案/高风险
    - L4 上报总裁 → 法律/合同/>100万/存续级

# 团队注册
teams:
  butler:
    name: "Butler团队"
    description: "项目交付管理专家团队"
    specialists:
      - delivery_expert      # 全球交付专家
      - training_expert    # 培训专家
      - pmo_expert         # PMO专家
      - iot_expert         # IoT施工专家
      - digital_modeling_expert  # 数字化建模专家
      - iot_data_expert    # IoT数据专家
      - uat_test_expert    # UAT测试专家
    capabilities:
      - 项目交付管理
      - 培训体系设计
      - PMO建设
      - IoT施工规划
      - 数字化建模
      - UAT测试
    access_key: "butler"  # 调用密钥

  rd:
    name: "研发团队"
    description: "技术研发团队"
    specialists:
      - tech_lead              # 技术负责人
      - backend_dev            # 后端开发工程师
      - frontend_dev           # 前端开发工程师
      - devops_engineer        # DevOps工程师
      - qa_engineer            # QA测试工程师
    capabilities:
      - 系统开发
      - 平台建设
      - 技术架构
    access_key: "rd"

  obs:
    name: "OBS知识管理团队"
    description: "OBS知识管理团队 - 负责构建企业知识库，沉淀项目经验，优化知识流转"
    specialists:
      - obs_architecture_expert    # 知识架构专家 - 设计知识库架构、标签体系、链接结构
      - knowledge_chandu_expert        # 知识沉淀专家 - 从项目/任务中提取知识、沉淀到知识库
      - knowledge_search_expert    # 知识检索专家 - 快速检索、关联、推荐相关知识
      - knowledge_quality_expert   # 知识质量专家 - 知识质量把控、去重、审核
    capabilities:
      - 知识库架构设计
      - 标签体系规划
      - 知识沉淀与萃取
      - 文档标准化
      - 知识检索与推荐
      - 知识质量审核
      - 去重与归档管理
    access_key: "obs"

  content_ops:
    name: "内容团队"
    description: "内容团队 - 将工作会话/项目经验/知识沉淀转化为结构化文章，本地生成精美 HTML，内部归档与分发"
    specialists:
      - content_strategist        # 内容策划专家 - 内容架构、知识提炼
      - content_creator           # 内容创作专家 - Markdown 文章撰写
      - visual_designer           # 视觉设计专家 - 样式模板、排版优化
      - publishing_ops            # HTML生成专家 - 调用 generate-article.py 生成本地 HTML
    capabilities:
      - 知识内容提炼与结构化
      - Markdown 文章撰写
      - 本地 HTML 文章生成（generate-article.py）
      - 科技蓝主题样式输出
      - 内部内容归档与分发
    access_key: "content_ops"

  graphify:
    name: "Graphify智囊团"
    description: "Graphify智囊团 - 第二大脑核心引擎，提供深度分析、关联发现、趋势洞察、决策支持、执行链审计"
    specialists:
      - strategist               # 战略分析师 - 深度分析、战略规划
      - relation_discovery       # 关联发现专家 - 知识图谱、隐性关联
      - trend_watcher           # 趋势洞察师 - 趋势识别、模式发现
      - decision_advisor        # 决策顾问 - 决策支持、选项评估
      - execution_auditor       # 执行审计师 - 任务分级、执行链审计、跨会话状态
      - ai_tech_researcher     # AI技术研究员 - AI前沿追踪、实践价值筛选、每日情报
    capabilities:
      - 战略分析
      - 关联发现
      - 趋势洞察
      - 决策支持
      - 知识图谱
      - 预测分析
      - 执行链审计
      - 任务分级
      - 跨会话状态管理
      - AI技术前沿追踪
      - 每日技术情报
    access_key: "graphify"

  harness_ops:
    name: "驾驭运维团队 (Harness Ops)"
    description: "Harness Ops团队 - 负责AI团队Harness体系的配置维护、代码开发、知识沉淀和质量保证。情报行动管线的专属执行团队。"
    specialists:
      - harness_engineer      # Harness配置工程师 - CLAUDE.md/执行链/决策规则维护
      - ai_systems_dev        # AI系统开发工程师 - hr_base.py/工具链/自动化脚本
      - knowledge_engineer    # 知识工程师 - 方法论文档/知识沉淀/OBS维护
      - integration_qa        # 集成测试工程师 - 变更验证/回归测试/质量门禁
    capabilities:
      - Harness Configuration 维护
      - 执行链/决策链设计与优化
      - AI系统代码开发(hr_base.py)
      - 自动化脚本与管线开发
      - 方法论文档与知识沉淀
      - 变更验证与集成测试
      - QA自动评分与质量门禁
    access_key: "harness_ops"

  growth:
    name: "增长团队"
    description: "增长团队 - 负责市场洞察、客户发现、竞争情报和GTM策略，打通外部信号与内部执行闭环"
    specialists:
      - customer_insights_manager    # 客户洞察经理 - 客户调研、需求验证、PMF分析
      - gtm_strategist               # GTM策略师 - 竞品跟踪、销售赋能、市场定位
    capabilities:
      - 客户需求调研与验证
      - 市场反馈汇总分析
      - 竞品跟踪与竞争定位
      - GTM策略设计
      - 销售赋能材料制作
      - 内容ROI提升
    access_key: "growth"

  janus:
    name: "Janus项目交付团队"
    description: "Janus项目交付团队 - 建筑数字化项目全生命周期交付，基于WBS工序标准化管理"
    project_type: "independent"  # 项目制团队，专注Janusd建筑数字化交付
    specialists:
      - janus_pm              # 项目交付经理 (WBS: PM)
      - janus_de              # 数字化交付工程师 (WBS: DE)
      - janus_sa              # 解决方案架构师 (WBS: SA)
      - janus_cde             # 业务咨询交付工程师 (WBS: CDE)
      - janus_qa              # 交付质量经理 (跨角色质量管控)
      - janus_pmo_auto        # PMO自动化工程师 (新增)
    capabilities:
      - 项目全生命周期交付管理
      - 建筑数字化建模(BIM/数字孪生)
      - IoT施工与数据绑点
      - 业务调研与初始化配置
      - RCC知识生产
      - UAT测试与验收管理
      - PMO自动化(WBS→Asana)
      - 阶段门质量管控
    access_key: "janus"

  stock:
    name: "股票交易系统项目"
    description: "股票交易系统项目（趋势智选）- A股趋势交易指导系统，基于《炒股的智慧》策略"
    project_type: "independent"  # 项目制，独立于现有研发团队
    specialists:
      - project_manager           # 项目经理 - 项目协调管理
      - trader                   # 交易员Agent - 交易执行/回测/复盘
      - quant_researcher          # 量化研究员 - 策略研究/指标开发
      - frontend_dev              # 前端开发 - Vue3界面
      - backend_dev              # 后端开发 - FastAPI服务
    capabilities:
      - A股趋势交易
      - 量化策略研究
      - 历史回测
      - 模拟交易
      - 仓位管理
      - 止损监控
    access_key: "stock"

