<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>SPE Quick Start - 4 Commands to Master Your Day</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   GLOBAL RESET & BASE
   ============================================================ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: #0f172a;
  color: #e2e8f0;
  font-family: 'JetBrains Mono', monospace;
}

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  position: relative;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
}

/* --- Progress bar (top-left) --- */
#progress-bar {
  position: absolute;
  top: 24px;
  left: 32px;
  display: flex;
  gap: 12px;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.6s;
}
#progress-bar.visible { opacity: 1; }

.prog-item {
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  background: rgba(255,255,255,0.06);
  color: #64748b;
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.4s;
}
.prog-item.active {
  background: rgba(20,184,166,0.18);
  color: #14b8a6;
  border-color: #14b8a6;
  box-shadow: 0 0 12px rgba(20,184,166,0.25);
}
.prog-item.done {
  background: rgba(20,184,166,0.10);
  color: #14b8a6;
  border-color: rgba(20,184,166,0.3);
}

/* --- Main content area --- */
#main-area {
  position: absolute;
  top: 70px;
  left: 32px;
  width: 1856px;
  height: 920px;
  display: flex;
  gap: 24px;
}

/* --- Terminal panel (left 65%) --- */
#terminal-panel {
  flex: 0 0 1200px;
  background: #0a0e1a;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#terminal-titlebar {
  height: 40px;
  background: rgba(255,255,255,0.03);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.dot { width:12px; height:12px; border-radius:50%; }
.dot-r { background:#ef4444; }
.dot-y { background:#eab308; }
.dot-g { background:#22c55e; }

#terminal-title {
  margin-left: 12px;
  font-size: 13px;
  color: #64748b;
}

#terminal-body {
  flex: 1;
  padding: 20px 24px;
  overflow: hidden;
  position: relative;
  font-size: 16px;
  line-height: 1.7;
}

#terminal-content {
  white-space: pre-wrap;
  word-break: break-all;
}

/* cursor */
#cursor {
  display: inline-block;
  width: 10px;
  height: 20px;
  background: #14b8a6;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* prompt */
.prompt { color: #14b8a6; }
.cmd-text { color: #f8fafc; }
.output-line { color: #94a3b8; }
.highlight-green { color: #22c55e; }
.highlight-yellow { color: #eab308; }
.highlight-red { color: #ef4444; }
.highlight-cyan { color: #14b8a6; }
.highlight-blue { color: #38bdf8; }
.highlight-purple { color: #a78bfa; }
.dim { color: #475569; }
.bold { font-weight: 700; }

/* --- Sidebar panel (right ~30%) --- */
#sidebar-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow: hidden;
}

/* sidebar card */
.sidebar-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 24px;
  opacity: 0;
  transform: translateX(30px);
  transition: all 0.5s ease-out;
}
.sidebar-card.visible {
  opacity: 1;
  transform: translateX(0);
}

.sidebar-card h3 {
  font-size: 18px;
  color: #14b8a6;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-card p, .sidebar-card li {
  font-size: 14px;
  color: #94a3b8;
  line-height: 1.8;
}

.sidebar-card ul { list-style: none; padding-left: 4px; }
.sidebar-card ul li::before { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #14b8a6; margin-right: 10px; vertical-align: middle; }

.sidebar-highlight {
  display: inline-block;
  padding: 2px 8px;
  background: rgba(20,184,166,0.15);
  border-radius: 4px;
  color: #14b8a6;
  font-weight: 700;
}

/* flow steps */
.flow-step {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease-out;
}
.flow-step.visible { opacity: 1; transform: translateY(0); }

.flow-num {
  flex: 0 0 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(20,184,166,0.2);
  color: #14b8a6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}

.flow-label { font-size: 14px; color: #cbd5e1; line-height: 1.6; }
.flow-arrow {
  width: 2px;
  height: 12px;
  background: rgba(20,184,166,0.3);
  margin-left: 13px;
  margin-bottom: 4px;
}

/* color swatch card */
.color-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  font-size: 14px;
}
.color-swatch {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  flex-shrink: 0;
}

/* PDCA ring */
.pdca-container {
  display: flex;
  justify-content: center;
  padding: 12px 0;
}
.pdca-ring {
  width: 240px;
  height: 240px;
  position: relative;
}
.pdca-quad {
  position: absolute;
  width: 110px;
  height: 110px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  transition: all 0.5s;
  opacity: 0.5;
}
.pdca-quad.active { opacity: 1; box-shadow: 0 0 16px rgba(20,184,166,0.3); }
.pdca-p { top:0; left:0; background:rgba(56,189,248,0.15); color:#38bdf8; border:1px solid rgba(56,189,248,0.3); }
.pdca-d { top:0; right:0; background:rgba(34,197,94,0.15); color:#22c55e; border:1px solid rgba(34,197,94,0.3); }
.pdca-c { bottom:0; right:0; background:rgba(234,179,8,0.15); color:#eab308; border:1px solid rgba(234,179,8,0.3); }
.pdca-a { bottom:0; left:0; background:rgba(168,85,247,0.15); color:#a855f7; border:1px solid rgba(168,85,247,0.3); }

.pdca-arrow {
  position: absolute;
  font-size: 20px;
  color: #475569;
}
.pdca-arrow-top { top: 50px; left: 50%; transform: translateX(-50%); }
.pdca-arrow-right { top: 50%; right: 50px; transform: translateY(-50%); }
.pdca-arrow-bottom { bottom: 50px; left: 50%; transform: translateX(-50%); }
.pdca-arrow-left { top: 50%; left: 50px; transform: translateY(-50%); }

/* --- Subtitle bar (bottom) --- */
#subtitle-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 1920px;
  height: 90px;
  background: linear-gradient(transparent, rgba(15,23,42,0.95) 30%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#subtitle-text {
  font-size: 22px;
  color: #e2e8f0;
  text-align: center;
  max-width: 1400px;
  line-height: 1.6;
  opacity: 0;
  transition: opacity 0.4s;
}
#subtitle-text.visible { opacity: 1; }

/* ============================================================
   SCENE OVERLAYS
   ============================================================ */

/* Hook scene overlay */
#hook-overlay {
  position: absolute;
  inset: 0;
  background: #0f172a;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: opacity 0.8s;
}

/* Chaotic notes for hook */
.chaos-note {
  position: absolute;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.3s;
  white-space: nowrap;
}

/* Title animation */
#hook-title {
  font-size: 52px;
  font-weight: 700;
  color: #f8fafc;
  opacity: 0;
  transform: scale(0.9);
  transition: all 1s ease-out;
  z-index: 10;
  text-align: center;
}
#hook-title.visible {
  opacity: 1;
  transform: scale(1);
}

#hook-subtitle {
  font-size: 24px;
  color: #14b8a6;
  margin-top: 16px;
  opacity: 0;
  transition: opacity 0.8s;
  z-index: 10;
}
#hook-subtitle.visible { opacity: 1; }

/* command cards at bottom of hook */
#hook-cards {
  position: absolute;
  bottom: 120px;
  display: flex;
  gap: 20px;
  z-index: 10;
}

.hook-card {
  padding: 12px 24px;
  background: rgba(20,184,166,0.1);
  border: 1px solid rgba(20,184,166,0.3);
  border-radius: 10px;
  font-size: 18px;
  font-weight: 700;
  color: #14b8a6;
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.5s ease-out;
}
.hook-card.visible {
  opacity: 1;
  transform: translateY(0);
}

/* CTA scene overlay */
#cta-overlay {
  position: absolute;
  inset: 0;
  background: #0f172a;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#cta-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

/* Architecture diagram for CTA */
.arch-layer {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 8px;
  opacity: 0;
  transform: translateX(-20px);
  transition: all 0.5s ease-out;
}
.arch-layer.visible { opacity: 1; transform: translateX(0); }

.arch-icon {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
.arch-label { font-size: 18px; color: #cbd5e1; }
.arch-cmd { font-size: 16px; color: #14b8a6; font-weight: 700; margin-left: 8px; }
.arch-arrow-down {
  margin-left: 22px;
  font-size: 20px;
  color: #334155;
  margin-bottom: 6px;
  opacity: 0;
  transition: opacity 0.4s;
}
.arch-arrow-down.visible { opacity: 1; }

#cta-text-area {
  margin-top: 48px;
  opacity: 0;
  transition: opacity 0.6s;
}
#cta-text-area.visible { opacity: 1; }

.cta-line {
  font-size: 20px;
  color: #94a3b8;
  margin-bottom: 12px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.5s ease-out;
}
.cta-line.visible { opacity: 1; transform: translateY(0); }
.cta-line.big { font-size: 26px; color: #f8fafc; font-weight: 700; }

#cta-brand {
  margin-top: 40px;
  text-align: center;
  opacity: 0;
  transition: opacity 1s;
}
#cta-brand.visible { opacity: 1; }
#cta-brand h2 {
  font-size: 36px;
  color: #14b8a6;
  margin-bottom: 8px;
}
#cta-brand p {
  font-size: 16px;
  color: #64748b;
}

/* inbox triage highlight */
.triage-highlight {
  display: inline-block;
  border-radius: 3px;
  padding: 0 4px;
  transition: background 0.4s;
}
.triage-decision { background: rgba(168,85,247,0.2); }
.triage-delegate { background: rgba(56,189,248,0.2); }
.triage-personal { background: rgba(34,197,94,0.2); }
.triage-reference { background: rgba(234,179,8,0.2); }

/* glitch effect */
@keyframes glitch {
  0% { transform: translate(0); filter: none; }
  20% { transform: translate(-4px, 2px); filter: hue-rotate(90deg); }
  40% { transform: translate(4px, -2px); filter: hue-rotate(-90deg); }
  60% { transform: translate(-2px, -4px); filter: hue-rotate(180deg); }
  80% { transform: translate(2px, 4px); filter: none; }
  100% { transform: translate(0); filter: none; }
}
.glitch { animation: glitch 0.3s ease-in-out; }

/* highlight flash */
@keyframes flash-green {
  0%, 100% { background: transparent; }
  50% { background: rgba(34,197,94,0.2); }
}
.flash-green { animation: flash-green 0.6s ease-in-out 2; border-radius: 4px; }

/* inbox flow sidebar diagram */
.inbox-flow {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 0;
}
.inbox-box {
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
}
.inbox-arrows {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.inbox-arrow { color: #475569; font-size: 16px; }
.inbox-bucket {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
}
</style>
</head>
<body>
<div id="app">

  <!-- Progress Bar -->
  <div id="progress-bar">
    <div class="prog-item" data-cmd="/capture">/capture</div>
    <div class="prog-item" data-cmd="/plan-day">/plan-day</div>
    <div class="prog-item" data-cmd="/time-block">/time-block</div>
    <div class="prog-item" data-cmd="/weekly-review">/weekly-review</div>
  </div>

  <!-- Main Area -->
  <div id="main-area">
    <!-- Terminal -->
    <div id="terminal-panel">
      <div id="terminal-titlebar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <span id="terminal-title">claude-code ~ SPE</span>
      </div>
      <div id="terminal-body">
        <div id="terminal-content"></div><span id="cursor"></span>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar-panel"></div>
  </div>

  <!-- Subtitle -->
  <div id="subtitle-bar">
    <div id="subtitle-text"></div>
  </div>

  <!-- Hook Overlay -->
  <div id="hook-overlay">
    <div id="hook-title">SPE &mdash; 你的个人效率引擎</div>
    <div id="hook-subtitle">4 个命令，掌控你的每一天</div>
    <div id="hook-cards">
      <div class="hook-card">/capture</div>
      <div class="hook-card">/plan-day</div>
      <div class="hook-card">/time-block</div>
      <div class="hook-card">/weekly-review</div>
    </div>
  </div>

  <!-- CTA Overlay -->
  <div id="cta-overlay"></div>

</div>

<script>
// ============================================================
// ENGINE
// ============================================================

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const wait = ms => new Promise(r => setTimeout(r, ms));

// Terminal state
const termContent = $('#terminal-content');
const cursorEl = $('#cursor');

function termClear() {
  termContent.innerHTML = '';
}

function termAppend(html) {
  termContent.insertAdjacentHTML('beforeend', html);
  // keep cursor after content
  termContent.parentElement.appendChild(cursorEl);
  // scroll to bottom
  const body = $('#terminal-body');
  body.scrollTop = body.scrollHeight;
}

async function typeText(text, className, charDelay) {
  charDelay = charDelay || 55;
  const span = document.createElement('span');
  if (className) span.className = className;
  termContent.appendChild(span);
  termContent.parentElement.appendChild(cursorEl);
  for (let i = 0; i < text.length; i++) {
    span.textContent += text[i];
    const body = $('#terminal-body');
    body.scrollTop = body.scrollHeight;
    // vary speed slightly
    await wait(charDelay + Math.random() * 25);
  }
}

async function typeCommand(cmd) {
  termAppend('<span class="prompt">$ </span>');
  await typeText(cmd, 'cmd-text', 55);
  termAppend('\n');
}

async function showOutputLines(lines, lineDelay) {
  lineDelay = lineDelay || 150;
  for (const line of lines) {
    termAppend(line + '\n');
    await wait(lineDelay);
  }
}

// Subtitle
function showSubtitle(text) {
  const el = $('#subtitle-text');
  el.textContent = text;
  el.classList.add('visible');
}
function hideSubtitle() {
  const el = $('#subtitle-text');
  el.classList.remove('visible');
}

// Progress bar
function setProgress(activeIndex) {
  // -1 = none active, 0-3 = active command, 4 = all done
  const items = $$('.prog-item');
  items.forEach((item, i) => {
    item.classList.remove('active', 'done');
    if (activeIndex === 4) {
      item.classList.add('done');
    } else if (i < activeIndex) {
      item.classList.add('done');
    } else if (i === activeIndex) {
      item.classList.add('active');
    }
  });
}

// Sidebar
function clearSidebar() {
  $('#sidebar-panel').innerHTML = '';
}

function addSidebarCard(html, delayMs) {
  const card = document.createElement('div');
  card.className = 'sidebar-card';
  card.innerHTML = html;
  $('#sidebar-panel').appendChild(card);
  setTimeout(() => card.classList.add('visible'), delayMs || 100);
  return card;
}

// ============================================================
// SCENES
// ============================================================

async function sceneHook() {
  // Scene 1: Hook (30s)
  const overlay = $('#hook-overlay');
  overlay.style.opacity = '1';
  overlay.style.display = 'flex';

  // Create chaos notes
  const chaosNotes = [
    { text: "Slack: 3条未读消息", x: 200, y: 180, bg: "rgba(239,68,68,0.15)", color: "#ef4444", rot: -5 },
    { text: "TODO: 更新报价表", x: 700, y: 120, bg: "rgba(234,179,8,0.15)", color: "#eab308", rot: 3 },
    { text: "14:00 客户会议", x: 400, y: 350, bg: "rgba(56,189,248,0.15)", color: "#38bdf8", rot: -2 },
    { text: "记得回王总邮件!", x: 1100, y: 200, bg: "rgba(168,85,247,0.15)", color: "#a855f7", rot: 7 },
    { text: "Q2 OKR 进度?", x: 900, y: 400, bg: "rgba(34,197,94,0.15)", color: "#22c55e", rot: -4 },
    { text: "供应商交货确认", x: 300, y: 500, bg: "rgba(249,115,22,0.15)", color: "#f97316", rot: 2 },
    { text: "Blog: 本周还没发", x: 1300, y: 350, bg: "rgba(239,68,68,0.15)", color: "#ef4444", rot: -6 },
    { text: "投标文件截止明天", x: 600, y: 650, bg: "rgba(234,179,8,0.15)", color: "#eab308", rot: 4 },
    { text: "日历冲突!", x: 1050, y: 550, bg: "rgba(239,68,68,0.2)", color: "#ef4444", rot: -3 },
    { text: "新Agent入职审批", x: 1400, y: 150, bg: "rgba(20,184,166,0.15)", color: "#14b8a6", rot: 5 },
  ];

  const noteEls = [];
  chaosNotes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'chaos-note';
    el.textContent = n.text;
    el.style.cssText = `left:${n.x}px; top:${n.y}px; background:${n.bg}; color:${n.color}; border:1px solid ${n.color}; transform:rotate(${n.rot}deg);`;
    overlay.appendChild(el);
    noteEls.push(el);
  });

  // Show subtitle
  showSubtitle("Synapse 帮你管好了 44 人的 AI 团队 ... 但你自己呢？");

  // Animate chaos notes in
  for (let i = 0; i < noteEls.length; i++) {
    noteEls[i].style.opacity = '1';
    await wait(200);
  }

  await wait(2000);
  showSubtitle("脑子里突然冒出的想法，Slack 里堆积的消息，日历上散落的会议 ...");
  await wait(3000);
  showSubtitle("这些谁来管？");
  await wait(1500);

  // Glitch + shatter transition
  overlay.classList.add('glitch');
  await wait(300);
  overlay.classList.remove('glitch');

  // Fade out chaos notes
  noteEls.forEach(el => { el.style.opacity = '0'; el.style.transition = 'all 0.4s'; });
  await wait(500);

  // Show title
  $('#hook-title').classList.add('visible');
  showSubtitle("今天用 4 分钟，我带你上手 SPE ...");
  await wait(2000);

  $('#hook-subtitle').classList.add('visible');
  showSubtitle("4 个命令，让你的每一天都不漏一件事。");
  await wait(2000);

  // Show command cards one by one
  const cards = $$('.hook-card');
  for (let i = 0; i < cards.length; i++) {
    cards[i].classList.add('visible');
    await wait(400);
  }
  await wait(2000);

  // Transition out: fade overlay, show progress bar
  overlay.style.transition = 'opacity 0.8s';
  overlay.style.opacity = '0';
  await wait(400);
  $('#progress-bar').classList.add('visible');
  await wait(500);
  overlay.style.display = 'none';
  hideSubtitle();
}


async function sceneCapture() {
  // Scene 2: /capture (45s)
  setProgress(0);
  termClear();
  clearSidebar();

  showSubtitle("第一个命令 ... /capture ... 随时随地把想法扔进收件箱。");
  await wait(3000);

  // Type first command
  showSubtitle("比如你突然想起要给王总回邮件 ... 直接 /capture 加上描述，一秒存入。");
  await typeCommand('/capture 给王总回邮件确认合同细节');
  await wait(800);

          <div class="cta-line">3. 明天早上 <span style="color:#14b8a6; font-weight:700;">/plan-day</span> 开始你的第一天</div>
        </div>
        <div id="cta-brand">
          <h2>Synapse Personal Engine</h2>
          <p>详细使用手册见 spe-user-guide.html</p>
          <p style="margin-top:12px; color:#334155;">Janus Digital &copy; 2026</p>
        </div>
      </div>
    </div>
  `;

  overlay.classList.add('visible');

  showSubtitle("回顾一下 ... 4 个命令，4 个动作 ...");
  await wait(2500);

  // Animate architecture layers
  const layers = overlay.querySelectorAll('.arch-layer');
  const arrows = overlay.querySelectorAll('.arch-arrow-down');
  for (let i = 0; i < layers.length; i++) {
    layers[i].classList.add('visible');
    if (arrows[i]) arrows[i].classList.add('visible');
    await wait(600);
  }
  // last arrow
  if (arrows[4]) arrows[4].classList.add('visible');

  showSubtitle("想到就 capture ... 早上 plan-day 看今日焦点 ... 重要的事 time-block 锁进日历 ...");
  await wait(4000);

  showSubtitle("周五 weekly-review 复盘一周 ... 捕获、规划、执行、回顾 ... 一个闭环，零遗漏。");
  await wait(4000);

  // Show CTA text
  const ctaArea = overlay.querySelector('#cta-text-area');
  ctaArea.classList.add('visible');

  const ctaLines = overlay.querySelectorAll('.cta-line');
  for (let i = 0; i < ctaLines.length; i++) {
    ctaLines[i].classList.add('visible');
    await wait(1000);
  }

  showSubtitle("现在就打开 Claude Code ... 输入 /capture ... 把你脑子里第一件想到的事存进去。");
  await wait(4000);

  showSubtitle("明天早上，用 /plan-day 开始你高效的一天。");
  await wait(3000);

  hideSubtitle();

  // Brand
  const brand = overlay.querySelector('#cta-brand');
  brand.classList.add('visible');

  await wait(4000); // Hold on brand
}


// ============================================================
// MAIN TIMELINE
// ============================================================

async function runAnimation() {
  await wait(2000); // Initial delay

  // Scene 1: Hook (30s)
  await sceneHook();

  // Scene 2: /capture (45s)
  await sceneCapture();
  await wait(500);

  // Scene 3: /plan-day (60s)
  await scenePlanDay();
  await wait(500);

  // Scene 4: /time-block (45s)
  await sceneTimeBlock();
  await wait(500);

  // Scene 5: /weekly-review (35s)
  await sceneWeeklyReview();
  await wait(500);

  // Scene 6: CTA (25s)
  await sceneCTA();

  // Signal animation completion for Playwright recorder
  document.body.setAttribute('data-animation-complete', 'true');
}

// Auto-start on load
window.addEventListener('load', () => {
  runAnimation();
});
</script>
