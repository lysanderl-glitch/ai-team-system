# RICE评分说明：
# Reach: 影响用户/项目数量 (1-10)
# Impact: 对单用户影响深度 (0.25/0.5/1/2/3)
# Confidence: 对评估准确性的信心 (0.5/0.8/1.0)
# Effort: 实际估算人天数 (S=1天/M=3天/L=8天/XL=20天)
# Score = (Reach × Impact × Confidence) / Effort

